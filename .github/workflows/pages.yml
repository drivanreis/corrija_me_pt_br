name: Publicar Pagina de Teste

on:
  push:
    branches:
      - main
    paths:
      - "test/**"
      - ".github/workflows/pages.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato estatico
        uses: actions/upload-pages-artifact@v3
        with:
          path: test

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
