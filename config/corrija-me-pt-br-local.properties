# Perfil local do corrija_me_pt_br.
# Mantem o servidor em modo simples, sem banco configurado e sem servicos externos.

cacheSize=1000
cacheTTLSeconds=600
maxCheckThreads=10
localApiMode=true
dbLogging=false
gracefulDatabaseFailure=true
anonymousAccessAllowed=true
suggestionsEnabled=true
maxSpellingSuggestions=4
skipLoggingChecks=false
skipLoggingRuleMatches=false
